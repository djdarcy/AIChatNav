name: CI

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Validate manifest.json
      run: |
        python3 -c "import json; json.load(open('src/manifest.json'))"
        echo "manifest.json is valid JSON"

    - name: Verify version sync
      run: |
        python3 scripts/sync-versions.py --check --no-git-ver
